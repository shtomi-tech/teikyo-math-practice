<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>数学過去問演習</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/katex@0.16.11/dist/katex.min.css">
  <link rel="stylesheet" href="./static/styles.css">
  <script defer src="https://cdn.jsdelivr.net/npm/katex@0.16.11/dist/katex.min.js"></script>
  <script defer src="https://cdn.jsdelivr.net/npm/katex@0.16.11/dist/contrib/auto-render.min.js"></script>
  <script defer src="./static/sougou-data.js"></script>
  <script defer src="./static/sougou2024-data.js"></script>
  <script defer src="./static/recommend-data.js"></script>
  <script defer src="./static/recommend-details.js"></script>
  <script defer src="./static/nichidai-data.js"></script>
  <script defer src="./static/nichidai-details.js"></script>
  <script defer src="./static/rikaido2507-data.js"></script>
  <script defer src="./static/hint-strategies.js"></script>
  <script defer src="./static/vendor/harness/cloud.js?v=0.1.0"></script>
  <script defer src="./static/app.js?v=20260716-cloud"></script>
</head>
<body>
  <header class="topbar">
    <div class="brand">
      <p class="eyebrow">MATH / PAST EXAMS</p>
      <h1 id="appTitle">数学過去問演習</h1>
    </div>
    <div class="top-actions">
      <button id="printBtn" class="ghost" type="button">印刷</button>
      <details class="utility-menu">
        <summary>生徒・設定</summary>
        <div class="utility-menu-body">
          <section class="utility-section student-panel">
            <h2>生徒</h2>
            <div class="student-tools">
              <select id="studentSel" title="生徒を選択"></select>
              <input id="newStudent" class="hidden-input" type="text" placeholder="新しい生徒の名前" autocomplete="off">
              <p id="studentHint" class="hint">ゲスト：記録は保存されません。</p>
              <details id="studentManage">
                <summary>生徒の管理…</summary>
                <div class="student-actions">
                  <button id="renameStudentBtn" class="ghost" type="button">この生徒の名前を変える</button>
                  <div class="danger-zone">
                    <p class="danger-zone-label">取り消せない操作</p>
                    <button id="resetProgressBtn" class="ghost danger" type="button">進捗をリセット（生徒は残す）</button>
                    <button id="deleteStudentBtn" class="ghost danger" type="button">生徒を削除（記録ごと消える）</button>
                  </div>
                </div>
              </details>
            </div>
          </section>
          <section class="utility-section settings-panel">
            <h2>詳細設定</h2>
            <div class="stack">
              <label class="checkline"><input id="hintMode" type="checkbox" checked> ヒントモード（段階表示・推奨）</label>
              <label class="checkline"><input id="instantCheck" type="checkbox"> 入力中に正誤を表示</label>
              <label class="checkline"><input id="hideSolutions" type="checkbox" checked> 採点前は解説ボタンを隠す</label>
            </div>
          </section>
        </div>
      </details>
    </div>
    <div class="contextbar" aria-label="演習条件">
      <section class="context-source-card">
        <span class="eyebrow">SOURCE</span>
        <strong id="sourceTitle">2026 総合型選抜</strong>
        <span id="sourceText">薬・理工学部 数学</span>
        <details class="source-switch-toggle">
          <summary>出典を変える</summary>
          <div class="source-switch-body">
            <section class="exam-panel" id="schoolPanel">
              <span class="context-label">学校</span>
              <div id="schoolSwitch" class="exam-switch" role="tablist" aria-label="学校・出典"></div>
            </section>
            <section class="exam-panel">
              <span class="context-label">方式・年度</span>
              <div id="examSwitch" class="exam-switch" role="tablist" aria-label="方式・年度"></div>
            </section>
          </div>
        </details>
      </section>
      <section class="context-progress" aria-label="全体の進捗">
        <span class="context-label">進捗</span>
        <div class="meter"><i id="progressFill"></i></div>
        <span class="meter-text" id="progressText">0 / 0</span>
      </section>
    </div>
  </header>

  <main class="shell">
    <aside class="sidebar">
      <section class="panel start-panel">
        <h2>演習</h2>
        <button id="continueBtn" class="cta" type="button">▶ つづきから解く</button>
        <p class="hint" id="continueHint"></p>
      </section>

      <section class="panel">
        <div class="section-head">
          <h2>大問</h2>
          <span class="muted" id="groupCount"></span>
        </div>
        <nav id="groupList" class="group-list" aria-label="大問一覧"></nav>
      </section>
    </aside>

    <section class="workspace">
      <section class="panel problem-panel">
        <div class="section-head">
          <div>
            <p class="eyebrow" id="groupMeta">GROUP</p>
            <h2 id="groupTitle"></h2>
          </div>
          <span class="badge" id="topicTag"></span>
        </div>
        <div class="stem" id="groupStem"></div>
        <div id="subList" class="sub-list"></div>
        <nav class="problem-nav" aria-label="大問の移動">
          <button id="prevGroupBtn" class="ghost" type="button">← 前の大問</button>
          <span id="problemPosition" class="muted"></span>
          <button id="nextGroupBtn" class="ghost" type="button">次の大問 →</button>
        </nav>
      </section>
    </section>

    <aside class="resultbar">
      <section class="panel">
        <h2>採点</h2>
        <div class="score" id="scoreBox">
          <span class="score-main">—</span>
          <span class="score-sub">未採点</span>
        </div>
        <div class="actions">
          <button id="gradeBtn" class="ghost" type="button">この大問をまとめて採点</button>
          <button id="nextIssueBtn" class="ghost" type="button">未入力のマスへ</button>
        </div>
        <div class="danger-zone">
          <button id="clearBtn" class="ghost danger" type="button">入力を全部消してやり直す</button>
        </div>
        <div id="resultList" class="result-list"></div>
      </section>

      <section class="panel keypad-panel">
        <h2>入力</h2>
        <div id="activeLabel" class="muted">マスを選択してください</div>
        <div class="keypad" id="keypad"></div>
      </section>

    </aside>
  </main>

  <div id="solutionModal" class="modal hidden" role="dialog" aria-modal="true" aria-labelledby="modalTitle">
    <div class="modal-box">
      <div class="modal-head">
        <div>
          <p class="eyebrow" id="modalMeta">SOLUTION</p>
          <h2 id="modalTitle">詳細解説</h2>
        </div>
        <button id="modalCloseBtn" class="ghost" type="button" aria-label="詳細解説を閉じる">閉じる</button>
      </div>
      <div id="modalBody" class="modal-body"></div>
    </div>
  </div>
</body>
</html>
